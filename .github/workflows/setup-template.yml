name: Setup Template
on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  setup:
    # Only run if this is a newly generated repository from the template
    if: ${{ github.repository != 'jmbish04/core-template-cfw-assets-astro-shadcn' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update repository details
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          
          # Check if the setup has already been run
          if grep -q "core-template-cfw-assets-astro-shadcn" package.json; then
            echo "Setting up new project from template: $REPO_NAME"
            
            # Update package.json name
            npm pkg set name="$REPO_NAME"

            # Update wrangler.jsonc (replaces worker name and d1 database_name)
            sed -i "s/core-template-cfw-assets-astro-shadcn/$REPO_NAME/g" wrangler.jsonc
            
            # Remove this setup workflow so it doesn't run again or stay in the new repo
            rm -f .github/workflows/setup-template.yml
            
            # Commit the changes
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add package.json wrangler.jsonc .github/workflows/setup-template.yml
            git commit -m "chore: setup project name from template"
            git push
          else
            echo "Project already set up."
          fi
