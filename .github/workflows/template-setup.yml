name: Template Setup

on:
  push:
    branches:
      - main
      - master

jobs:
  setup:
    runs-on: ubuntu-latest
    # This prevents the workflow from running on the template repository itself
    if: ${{ github.repository != '126colby/core-template-cfw-assets-astro-shadcn' }}
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Rename project files
        run: |
          # Get the new repository name dynamically
          REPO_NAME="${{ github.event.repository.name }}"

          # Update package.json
          # This replaces the specific @126colby scoped name with the new repo name
          sed -i "s/@126colby\/core-template-cfw-assets-astro-shadcn/$REPO_NAME/g" package.json

          # Update wrangler.jsonc
          # This replaces the unscoped template name with the new repo name
          # Using sed preserves any JSONC comments you have in the file
          sed -i "s/core-template-cfw-assets-astro-shadcn/$REPO_NAME/g" wrangler.jsonc

      - name: Update dependencies
        run: |
          # The --latest flag ensures package.json is rewritten with the newest versions
          # It also automatically updates the pnpm-lock.yaml file
          pnpm up --latest

      - name: Remove setup workflow
        run: rm .github/workflows/template-setup.yml

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Stage all modified and deleted files
          git add package.json wrangler.jsonc pnpm-lock.yaml .github/workflows/template-setup.yml
          
          git commit -m "chore: initialize project name and update dependencies to latest"
          git push
